<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Record & Transcribe</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f14;
      color: #e4e4e7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
    }

    .container {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      text-align: center;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .card {
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 16px;
      padding: 24px;
    }

    .recorder-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .timer {
      font-size: 3rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      color: #a78bfa;
    }

    .wave-container {
      width: 100%;
      height: 80px;
      display: none;
      border-radius: 12px;
      overflow: hidden;
      background: #12121a;
      border: 1px solid #2a2a3a;
    }

    .wave-container.visible {
      display: block;
    }

    .wave-container canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .status {
      font-size: 0.875rem;
      color: #71717a;
      text-align: center;
      min-height: 20px;
    }

    .status.recording {
      color: #f87171;
      animation: pulse 1.5s infinite;
    }

    .status.transcribing {
      color: #fbbf24;
    }

    .status.complete {
      color: #4ade80;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-record {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #f87171;
      color: white;
      font-size: 1.5rem;
      box-shadow: 0 0 0 8px rgba(248, 113, 113, 0.2);
    }

    .btn-record:hover:not(:disabled) {
      transform: scale(1.05);
      box-shadow: 0 0 0 12px rgba(248, 113, 113, 0.3);
    }

    .btn-record.recording {
      background: #ef4444;
      box-shadow: 0 0 0 8px rgba(239, 68, 68, 0.3);
      animation: pulse 1.5s infinite;
    }

    .btn-record.recording:hover:not(:disabled) {
      box-shadow: 0 0 0 12px rgba(239, 68, 68, 0.4);
    }

    .result-section {
      display: none;
      flex-direction: column;
      gap: 16px;
    }

    .result-section.visible {
      display: flex;
    }

    .ready-section {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .ready-section.visible {
      display: flex;
    }

    .transcription-text {
      background: #12121a;
      border: 1px solid #2a2a3a;
      border-radius: 12px;
      padding: 16px;
      font-size: 0.9375rem;
      line-height: 1.6;
      color: #d4d4d8;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 80px;
      max-height: 300px;
      overflow-y: auto;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .btn-secondary {
      background: #27272a;
      color: #e4e4e7;
      border: 1px solid #3f3f46;
      flex: 1;
      min-width: 120px;
    }

    .btn-secondary:hover:not(:disabled) {
      background: #3f3f46;
    }

    .btn-primary {
      background: #7c3aed;
      color: white;
      flex: 1;
      min-width: 120px;
    }

    .btn-primary:hover:not(:disabled) {
      background: #6d28d9;
    }

    .error-message {
      color: #f87171;
      font-size: 0.875rem;
      text-align: center;
    }

    .debug-panel {
      padding: 0;
      overflow: hidden;
    }

    .debug-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #71717a;
      user-select: none;
    }

    .debug-header:hover {
      color: #a1a1aa;
    }

    .debug-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .debug-copy-btn {
      background: #27272a;
      border: 1px solid #3f3f46;
      color: #a1a1aa;
      font-size: 0.65rem;
      padding: 2px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
    }

    .debug-copy-btn:hover {
      color: #fff;
      border-color: #52525b;
    }

    .debug-log {
      background: #0c0c12;
      border-top: 1px solid #2a2a3a;
      padding: 12px 16px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.7rem;
      line-height: 1.6;
      color: #a1a1aa;
      max-height: 300px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
      margin: 0;
      display: none;
    }

    .debug-log.visible {
      display: block;
    }

    .debug-log .ts { color: #52525b; }
    .debug-log .info { color: #60a5fa; }
    .debug-log .warn { color: #fbbf24; }
    .debug-log .error { color: #f87171; }
    .debug-log .ok { color: #4ade80; }
    .debug-log .key { color: #a78bfa; }

    .cost-footer {
      text-align: center;
      font-size: 0.7rem;
      color: #52525b;
      padding-top: 4px;
    }

    .cost-footer a {
      color: #71717a;
      text-decoration: none;
    }

    .cost-footer a:hover {
      color: #a1a1aa;
    }

    @media (max-width: 480px) {
      .container { max-width: 100%; }
      h1 { font-size: 1.4rem; }
      .timer { font-size: 2.25rem; }
      .card { padding: 16px; }
      .btn-record { width: 60px; height: 60px; font-size: 1.25rem; }
      .btn { padding: 10px 16px; font-size: 0.875rem; }
      .actions { flex-direction: column; }
      .actions .btn { min-width: 100%; }
      .wave-container { height: 60px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Record & Transcribe</h1>

    <div class="card">
      <div class="recorder-section">
        <div class="timer" id="timer">00:00</div>
        <div class="wave-container" id="waveContainer">
          <canvas id="waveCanvas"></canvas>
        </div>
        <div class="status" id="status">Press record to start</div>
        <button class="btn btn-record" id="recordBtn" title="Record">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
            <circle cx="12" cy="12" r="6"/>
          </svg>
        </button>
        <div class="ready-section" id="readySection">
          <button class="btn btn-secondary" id="playBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" id="playIcon">
              <polygon points="5,3 19,12 5,21"/>
            </svg>
            <span id="playLabel">Play</span>
          </button>
          <audio id="audioPlayer" style="display:none;"></audio>
          <button class="btn btn-secondary" id="downloadAudioBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7,10 12,15 17,10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Download Audio
          </button>
          <button class="btn btn-secondary" id="downloadMp3Btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7,10 12,15 17,10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Download MP3
          </button>
          <button class="btn btn-primary" id="transcribeBtn">
            Transcribe
          </button>
        </div>
      </div>
    </div>

    <div class="card result-section" id="resultSection">
      <div class="transcription-text" id="transcriptionText">Transcribed text will appear here...</div>
      <div class="error-message" id="errorMessage" style="display:none;"></div>
      <div class="actions">
        <button class="btn btn-secondary" id="copyBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          Copy Text
        </button>
        <button class="btn btn-secondary" id="downloadTextBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7,10 12,15 17,10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Download .txt
        </button>
      </div>
    </div>

    <div class="card debug-panel" id="debugPanel">
      <div class="debug-header" id="debugToggle">
        <span>Debug</span>
        <div class="debug-actions">
          <button class="debug-copy-btn" id="debugClearBtn">Clear</button>
          <button class="debug-copy-btn" id="debugCopyBtn">Copy</button>
          <span id="debugArrow">▲</span>
        </div>
      </div>
      <pre class="debug-log visible" id="debugLog"></pre>
    </div>

    <div class="cost-footer">
      <a href="https://github.com/rifaterdemsahin/record-and-transcribe/blob/main/cost-comparison.md" target="_blank">Cost compare ↗</a>
      ·
      <a href="https://openrouter.ai/settings/credits" target="_blank">Credits ↗</a>
      ·
      <a href="https://openrouter.ai/logs" target="_blank">Usage logs ↗</a>
    </div>
  </div>

  <script>
    (function() {
      const recordBtn = document.getElementById('recordBtn');
      const timerEl = document.getElementById('timer');
      const statusEl = document.getElementById('status');
      const waveContainer = document.getElementById('waveContainer');
      const waveCanvas = document.getElementById('waveCanvas');
      const readySection = document.getElementById('readySection');
      const resultSection = document.getElementById('resultSection');
      const transcriptionText = document.getElementById('transcriptionText');
      const errorMessage = document.getElementById('errorMessage');
      const copyBtn = document.getElementById('copyBtn');
      const downloadTextBtn = document.getElementById('downloadTextBtn');
      const downloadAudioBtn = document.getElementById('downloadAudioBtn');
      const downloadMp3Btn = document.getElementById('downloadMp3Btn');
      const transcribeBtn = document.getElementById('transcribeBtn');
      const playBtn = document.getElementById('playBtn');
      const playIcon = document.getElementById('playIcon');
      const playLabel = document.getElementById('playLabel');
      const audioPlayer = document.getElementById('audioPlayer');
      const debugLog = document.getElementById('debugLog');
      const debugToggle = document.getElementById('debugToggle');
      const debugArrow = document.getElementById('debugArrow');
      const debugCopyBtn = document.getElementById('debugCopyBtn');
      const debugClearBtn = document.getElementById('debugClearBtn');

      let mediaRecorder;
      let audioChunks = [];
      let timerInterval;
      let seconds = 0;
      let isRecording = false;
      let audioBlob = null;
      let audioSrc = null;
      let mimeType = '';
      let audioContext;
      let analyser;
      let waveAnimId;
      let stream;

      function detectMimeType() {
        const types = [
          'audio/webm;codecs=opus',
          'audio/webm',
          'audio/ogg;codecs=opus',
          'audio/mp4',
          'audio/aac',
          'audio/wav',
        ];
        for (const t of types) {
          if (MediaRecorder.isTypeSupported(t)) return t;
        }
        return '';
      }

      function debug(msg, cls) {
        const ts = new Date().toLocaleTimeString();
        const line = `<span class="ts">${ts}</span> <span class="${cls || 'info'}">${msg}</span>\n`;
        debugLog.innerHTML += line;
        debugLog.scrollTop = debugLog.scrollHeight;
      }

      function clearDebug() {
        debugLog.innerHTML = '';
        debug('--- new session ---', 'key');
      }

      async function fetchServerDebug() {
        try {
          const r = await fetch('/api/debug');
          const d = await r.json();
          debug('Server: ' + d.provider + ' | whisper=' + d.model + ' | fallback=' + d.fallback + ' | key=' + d.keyPrefix, 'key');
          debug('Cost: OpenRouter $0.006/min vs fly.io local $5.70/mo | ' + d.costComparison, 'info');
        } catch (e) {
          debug('Server debug fetch failed: ' + e.message, 'error');
        }
      }

      debugToggle.addEventListener('click', () => {
        const open = debugLog.classList.toggle('visible');
        debugArrow.textContent = open ? '▲' : '▼';
      });

      debugCopyBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        const text = debugLog.textContent || debugLog.innerText;
        navigator.clipboard.writeText(text).then(() => {
          debugCopyBtn.textContent = 'Copied';
          setTimeout(() => { debugCopyBtn.textContent = 'Copy'; }, 1500);
        });
      });

      debugClearBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        clearDebug();
        fetchServerDebug();
      });

      function formatTime(s) {
        const mins = Math.floor(s / 60).toString().padStart(2, '0');
        const secs = (s % 60).toString().padStart(2, '0');
        return `${mins}:${secs}`;
      }

      function setStatus(text, className) {
        statusEl.textContent = text;
        statusEl.className = 'status ' + (className || '');
      }

      function setError(text) {
        errorMessage.textContent = text;
        errorMessage.style.display = text ? 'block' : 'none';
      }

      function resetUI() {
        readySection.classList.remove('visible');
        resultSection.classList.remove('visible');
        transcriptionText.textContent = 'Transcribed text will appear here...';
        audioPlayer.pause();
        audioPlayer.src = '';
        if (audioSrc) { URL.revokeObjectURL(audioSrc); audioSrc = null; }
        setError('');
      }

      function stopWave() {
        if (waveAnimId) { cancelAnimationFrame(waveAnimId); waveAnimId = null; }
        if (audioContext && audioContext.state !== 'closed') { audioContext.close(); }
        audioContext = null;
        analyser = null;
        waveContainer.classList.remove('visible');
      }

      function drawWave() {
        if (!analyser) return;
        waveAnimId = requestAnimationFrame(drawWave);

        const canvas = waveCanvas;
        const ctx = canvas.getContext('2d');
        const dpr = window.devicePixelRatio || 1;
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        ctx.scale(dpr, dpr);

        const bufferLength = analyser.frequencyBinCount;
        const dataArray = new Uint8Array(bufferLength);
        analyser.getByteFrequencyData(dataArray);

        const w = rect.width;
        const h = rect.height;
        ctx.clearRect(0, 0, w, h);

        const barCount = 48;
        const barWidth = (w / barCount) * 0.7;
        const gap = (w / barCount) * 0.3;
        const step = Math.floor(bufferLength / barCount);

        for (let i = 0; i < barCount; i++) {
          const value = dataArray[i * step] / 255;
          const barHeight = Math.max(2, value * h * 0.9);
          const x = i * (barWidth + gap);
          const y = (h - barHeight) / 2;

          const gradient = ctx.createLinearGradient(x, y, x, y + barHeight);
          gradient.addColorStop(0, '#a78bfa');
          gradient.addColorStop(1, '#7c3aed');
          ctx.fillStyle = gradient;

          ctx.beginPath();
          ctx.roundRect(x, y, barWidth, barHeight, [barWidth / 2]);
          ctx.fill();
        }
      }

      function startWave(mediaStream) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 256;
        analyser.smoothingTimeConstant = 0.7;

        const source = audioContext.createMediaStreamSource(mediaStream);
        source.connect(analyser);

        waveContainer.classList.add('visible');
        drawWave();
      }

      function finalizeRecording() {
        audioBlob = new Blob(audioChunks, { type: mimeType || 'audio/webm' });
        debug('Chunks: ' + audioChunks.length + ' | Blob: ' + (audioBlob.size / 1024).toFixed(1) + ' KB | Duration: ' + formatTime(seconds), 'ok');
        if (audioSrc) URL.revokeObjectURL(audioSrc);
        audioSrc = URL.createObjectURL(audioBlob);
        audioPlayer.src = audioSrc;
        playIcon.innerHTML = '<polygon points="5,3 19,12 5,21"/>';
        playLabel.textContent = 'Play';
        stopWave();
        setStatus('Recording complete — ' + formatTime(seconds), 'complete');
        readySection.classList.add('visible');
      }

      async function startRecording() {
        try {
          clearDebug();
          fetchServerDebug();

          stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          mimeType = detectMimeType();

          debug('MIME: ' + (mimeType || 'browser default'), 'key');
          debug('Audio tracks: ' + stream.getAudioTracks().length, 'info');

          const opts = mimeType ? { mimeType } : {};
          mediaRecorder = new MediaRecorder(stream, opts);

          debug('Recorder state: ' + mediaRecorder.state, 'info');

          audioChunks = [];

          mediaRecorder.ondataavailable = (e) => {
            if (e.data && e.data.size > 0) {
              audioChunks.push(e.data);
            }
          };

          mediaRecorder.onstop = () => {
            debug('Recorder onstop fired', 'info');
            stream.getTracks().forEach(t => t.stop());
            stream = null;
            finalizeRecording();
          };

          mediaRecorder.onerror = (e) => {
            debug('Recorder error: ' + JSON.stringify(e.error), 'error');
            stopWave();
            setError('Recording error. Please try again.');
          };

          mediaRecorder.start(250);
          debug('Recorder started (timeslice=250ms)', 'ok');
          isRecording = true;
          seconds = 0;
          audioBlob = null;
          timerEl.textContent = '00:00';
          recordBtn.classList.add('recording');
          resetUI();
          setStatus('Recording...', 'recording');
          setError('');

          startWave(stream);

          timerInterval = setInterval(() => {
            seconds++;
            timerEl.textContent = formatTime(seconds);
          }, 1000);
        } catch (err) {
          debug('getUserMedia error: ' + err.message, 'error');
          stopWave();
          setError('Microphone access denied. Please allow microphone access and try again.');
        }
      }

      function stopRecording() {
        if (!mediaRecorder || !isRecording) return;

        if (mediaRecorder.state === 'recording') {
          mediaRecorder.requestData();
          debug('requestData() called before stop', 'warn');
        }
        debug('Stopping recorder (state=' + mediaRecorder.state + ')', 'warn');
        mediaRecorder.stop();
        isRecording = false;
        clearInterval(timerInterval);
        recordBtn.classList.remove('recording');
      }

      async function transcribeAudio() {
        if (!audioBlob || audioBlob.size === 0) {
          setError('No audio recorded. Please try recording again.');
          return;
        }

        const ext = mimeType.includes('mp4') ? 'mp4' : mimeType.includes('ogg') ? 'ogg' : 'webm';
        const formData = new FormData();
        formData.append('audio', audioBlob, 'recording.' + ext);

        debug('POST /api/transcribe (' + (audioBlob.size / 1024).toFixed(1) + ' KB, ' + mimeType + ')', 'warn');

        readySection.classList.remove('visible');
        resultSection.classList.remove('visible');
        setStatus('Transcribing...', 'transcribing');
        recordBtn.disabled = true;
        transcribeBtn.disabled = true;

        try {
          const response = await fetch('/api/transcribe', {
            method: 'POST',
            body: formData,
          });

          const data = await response.json();

          if (!response.ok) {
            debug('Response ' + response.status + ': ' + (data.error || 'unknown'), 'error');
            if (data.creditsLink) {
              debug('Credits: ' + data.creditsLink, 'warn');
            }
            if (data.costComparison) {
              debug('Cost compare: ' + data.costComparison, 'info');
            }
            let msg = data.error || 'Transcription failed';
            if (data.creditsLink) msg += '\n\nCredits: ' + data.creditsLink;
            if (data.costComparison) msg += '\nCost comparison: ' + data.costComparison;
            throw new Error(msg);
          }

          const modelLabel = data.fallback ? 'gemini (fallback)' : (data.model || 'whisper');
          debug('Response 200 | ' + modelLabel + ' | text: ' + data.text.substring(0, 60) + (data.text.length > 60 ? '...' : ''), 'ok');
          transcriptionText.textContent = data.text;
          resultSection.classList.add('visible');
          setStatus('Transcription complete', 'complete');
          setError('');
        } catch (err) {
          debug('Fetch error: ' + err.message, 'error');
          setError(err.message || 'Transcription failed. Please try again.');
          setStatus('Transcription failed');
        } finally {
          recordBtn.disabled = false;
          transcribeBtn.disabled = false;
        }
      }

      recordBtn.addEventListener('click', () => {
        if (isRecording) {
          stopRecording();
        } else {
          startRecording();
        }
      });

      transcribeBtn.addEventListener('click', transcribeAudio);

      playBtn.addEventListener('click', () => {
        if (audioPlayer.paused) {
          audioPlayer.play();
          playIcon.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
          playLabel.textContent = 'Pause';
        } else {
          audioPlayer.pause();
          playIcon.innerHTML = '<polygon points="5,3 19,12 5,21"/>';
          playLabel.textContent = 'Play';
        }
      });

      audioPlayer.addEventListener('ended', () => {
        playIcon.innerHTML = '<polygon points="5,3 19,12 5,21"/>';
        playLabel.textContent = 'Play';
      });

      copyBtn.addEventListener('click', () => {
        const text = transcriptionText.textContent;
        if (!text || text === 'Transcribed text will appear here...') return;
        navigator.clipboard.writeText(text).then(() => {
          const orig = copyBtn.innerHTML;
          copyBtn.innerHTML = copyBtn.innerHTML.replace(/Copy Text/, 'Copied!');
          setTimeout(() => { copyBtn.innerHTML = orig; }, 2000);
        });
      });

      downloadTextBtn.addEventListener('click', () => {
        const text = transcriptionText.textContent;
        if (!text || text === 'Transcribed text will appear here...') return;
        const ts = new Date().toISOString().replace(/[:.]/g, '-').substring(0, 19);
        const blob = new Blob([text], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'transcription-' + ts + '.txt';
        a.click();
        URL.revokeObjectURL(url);
      });

      downloadAudioBtn.addEventListener('click', () => {
        if (!audioBlob || audioBlob.size === 0) {
          debug('Download blocked: blob is ' + (audioBlob ? audioBlob.size + ' bytes' : 'null'), 'error');
          setError('No audio data. Please record first.');
          return;
        }
        const ext = mimeType.includes('mp4') ? 'mp4' : mimeType.includes('ogg') ? 'ogg' : 'webm';
        const url = URL.createObjectURL(audioBlob);
        const ts = new Date().toISOString().replace(/[:.]/g, '-').substring(0, 19);
        debug('Download: recording-' + ts + '.' + ext + ' (' + (audioBlob.size / 1024).toFixed(1) + ' KB)', 'ok');
        const a = document.createElement('a');
        a.href = url;
        a.download = 'recording-' + ts + '.' + ext;
        a.click();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
      });

      downloadMp3Btn.addEventListener('click', async () => {
        if (!audioBlob || audioBlob.size === 0) {
          debug('MP3 download blocked: blob is ' + (audioBlob ? audioBlob.size + ' bytes' : 'null'), 'error');
          setError('No audio data. Please record first.');
          return;
        }
        debug('Converting to MP3...', 'warn');
        const formData = new FormData();
        formData.append('audio', audioBlob, 'recording.webm');
        try {
          const r = await fetch('/api/convert-to-mp3', { method: 'POST', body: formData });
          if (!r.ok) {
            const d = await r.json();
            throw new Error(d.error || 'MP3 conversion failed');
          }
          const mp3Blob = await r.blob();
          debug('MP3: ' + (mp3Blob.size / 1024).toFixed(1) + ' KB', 'ok');
          const url = URL.createObjectURL(mp3Blob);
          const ts = new Date().toISOString().replace(/[:.]/g, '-').substring(0, 19);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'recording-' + ts + '.mp3';
          a.click();
          setTimeout(() => URL.revokeObjectURL(url), 1000);
        } catch (err) {
          debug('MP3 error: ' + err.message, 'error');
          setError('MP3 conversion failed: ' + err.message);
        }
      });
    })();
  </script>
</body>
</html>
